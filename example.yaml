tenant: product-catalog
cluster: hub-prod-local
#cluster: workload-prod-local

default:
  destination: workload-prod-local
  networkPolicy: true
  quota: medium
  # Labels applied to all namespaces, merged with labels defined on namespace
  labels:
    tenant: product-catalog

argocd:
  # Namespace where the tenant Argo CD is located, if
  # set an AppProject for the tenant will be created
  namespace: argocd
  # Repositories the tenant is limited to
  sourceRepos:
    - '*'
  # Groups for which users will be admins of the AppProject
  adminGroups:
   - product-catalog-admins
  # Groups for which users will be users of the AppProject
  userGroups:
   - product-catalog-users
  pipelineGroups:
   - product-catalog-pipeline

namespaces:

  dev:
    annotations:
      app.openshift.io/vcs-uri: https://github.com/gnunn-gitops/product-catalog
      app.openshift.io/vcs-ref: main
      openshift.io/display-name: "Product Catalog Dev"

  stage:
    annotations:
      openshift.io/display-name: "Product Catalog Stage"

  prod:
    annotations:
      openshift.io/display-name: "Product Catalog Prod"

  cicd:
    annotations:
      openshift.io/display-name: "Product Catalog CICD"

  argocd:
    annotations:
      openshift.io/display-name: "Product Catalog Argo CD"
    destination: hub-prod-local
    quota: small

extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "{{ .Release.Name }}-custom-config"
    data:
      environment: "production"
      custom_key: "custom_value"
